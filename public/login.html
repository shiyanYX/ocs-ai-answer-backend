<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - OCS AI 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --primary-light: #3b82f6;
            --primary-lighter: #60a5fa;
            --secondary: #3b82f6;
            --success: #059669;
            --error: #dc2626;
            --warning: #d97706;
            --bg-primary: #eff6ff;
            --bg-secondary: #f8fafc;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #dbeafe;
            --border-light: #e0f2fe;
            --shadow-sm: 0 1px 2px rgba(30, 64, 175, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(30, 64, 175, 0.1), 0 2px 4px -2px rgba(30, 64, 175, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(30, 64, 175, 0.15), 0 4px 6px -4px rgba(30, 64, 175, 0.1);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #dbeafe 0%, #eff6ff 30%, #f0f9ff 60%, #ffffff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            padding: 40px;
            animation: fadeInUp 0.4s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 50%, var(--primary-lighter) 100%);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            box-shadow: 0 6px 24px rgba(30, 64, 175, 0.4);
        }

        .brand-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .brand-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background: var(--bg-secondary);
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background: var(--bg-primary);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .alert {
            padding: 12px 16px;
            border-radius: var(--radius-md);
            margin-bottom: 16px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.08);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .alert-warning {
            background: rgba(245, 158, 11, 0.08);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.08);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .password-requirement {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .password-requirement .check {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: var(--text-secondary);
        }

        .password-requirement.fulfilled .check {
            background: var(--success);
            color: white;
        }

        .password-requirement.fulfilled {
            color: var(--success);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 28px;
            }
            
            .brand-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand">
                <div class="brand-icon">⚙️</div>
                <div class="brand-title">OCS AI 管理后台</div>
                <div class="brand-subtitle">安全登录</div>
            </div>

            <div id="alertContainer"></div>

            <form id="loginForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input 
                        type="text" 
                        id="username" 
                        class="form-input" 
                        placeholder="请输入用户名"
                        autocomplete="username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="form-input" 
                        placeholder="请输入密码"
                        autocomplete="current-password"
                        required
                    >
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary">
                    <span>登录</span>
                </button>
            </form>

            <div id="changePasswordForm" style="display: none;">
                <div class="alert alert-warning">
                    <span>⚠️</span>
                    <span>首次登录，请设置新密码</span>
                </div>
                
                <div class="form-group">
                    <label class="form-label">新密码</label>
                    <input 
                        type="password" 
                        id="newPassword" 
                        class="form-input" 
                        placeholder="请输入新密码（至少6位）"
                        required
                    >
                    <div class="password-requirement" id="pwdLength">
                        <span class="check">✓</span>
                        <span>至少6个字符</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        class="form-input" 
                        placeholder="再次输入新密码"
                        required
                    >
                </div>

                <button type="button" id="changePwdBtn" class="btn btn-primary">
                    <span>设置新密码</span>
                </button>
                
                <button type="button" id="cancelChangeBtn" class="btn btn-secondary" style="margin-top: 12px;">
                    取消
                </button>
            </div>

            <div class="footer-text">
                <a href="http://localhost:3000" target="_blank">返回首页</a>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('adminToken');
        if (token) {
            fetch('/api/admin/status', {
                headers: { 'X-Admin-Token': token }
            }).then(r => {
                if (r.ok) {
                    window.location.href = '/admin.html';
                }
            });
        }

        function showAlert(type, message) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `
                <span>${type === 'error' ? '✕' : type === 'warning' ? '⚠️' : '✓'}</span>
                <span>${message}</span>
            `;
            container.innerHTML = '';
            container.appendChild(alert);
        }

        function validatePassword() {
            const pwd = document.getElementById('newPassword').value;
            const lengthCheck = document.getElementById('pwdLength');
            
            if (pwd.length >= 6) {
                lengthCheck.classList.add('fulfilled');
            } else {
                lengthCheck.classList.remove('fulfilled');
            }
        }

        document.getElementById('newPassword').addEventListener('input', validatePassword);

        async function handleSubmit(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> 登录中...';

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('adminToken', data.token);
                    
                    if (data.mustChangePassword) {
                        document.getElementById('loginForm').style.display = 'none';
                        document.getElementById('changePasswordForm').style.display = 'block';
                        showAlert('warning', '首次登录，请设置新密码');
                    } else {
                        window.location.href = '/admin.html';
                    }
                } else {
                    showAlert('error', data.msg || '登录失败');
                }
            } catch (error) {
                showAlert('error', '网络错误，请稍后重试');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>登录</span>';
            }
        }

        document.getElementById('changePwdBtn').addEventListener('click', async () => {
            const username = document.getElementById('username').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('changePwdBtn');

            if (newPassword.length < 6) {
                showAlert('error', '密码至少需要6位');
                return;
            }

            if (newPassword !== confirmPassword) {
                showAlert('error', '两次输入的密码不一致');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> 设置中...';

            try {
                const response = await fetch('/api/admin/change-password', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Admin-Token': localStorage.getItem('adminToken')
                    },
                    body: JSON.stringify({
                        username,
                        oldPassword: document.getElementById('password').value,
                        newPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('success', '密码修改成功，即将跳转...');
                    setTimeout(() => {
                        window.location.href = '/admin.html';
                    }, 1500);
                } else {
                    showAlert('error', data.msg || '修改失败');
                }
            } catch (error) {
                showAlert('error', '网络错误');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>设置新密码</span>';
            }
        });

        document.getElementById('cancelChangeBtn').addEventListener('click', () => {
            document.getElementById('changePasswordForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('alertContainer').innerHTML = '';
        });
    </script>
</body>
</html>
