<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - OCS AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --primary-light: #3b82f6;
            --primary-lighter: #60a5fa;
            --primary-hover: #1e40af;
            --success: #059669;
            --error: #dc2626;
            --warning: #d97706;
            --info: #0284c7;
            --bg-sidebar: #0f172a;
            --bg-sidebar-hover: #1e293b;
            --bg-sidebar-active: rgba(30, 64, 175, 0.3);
            --bg-primary: #eff6ff;
            --bg-card: #ffffff;
            --text-sidebar: #94a3b8;
            --text-sidebar-active: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #dbeafe;
            --border-light: #e0f2fe;
            --shadow-sm: 0 1px 2px rgba(30, 64, 175, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(30, 64, 175, 0.1), 0 2px 4px -2px rgba(30, 64, 175, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(30, 64, 175, 0.15), 0 4px 6px -4px rgba(30, 64, 175, 0.1);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --sidebar-width: 250px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            min-height: 100vh;
            padding: 24px 0;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 0 24px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 16px;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .sidebar-brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .sidebar-brand-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-sidebar-active);
        }

        .sidebar-nav {
            flex: 1;
            padding: 0 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--text-sidebar);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            margin-bottom: 4px;
            cursor: pointer;
        }

        .nav-item:hover {
            background: var(--bg-sidebar-hover);
            color: var(--text-sidebar-active);
        }

        .nav-item.active {
            background: var(--bg-sidebar-active);
            color: var(--text-sidebar-active);
            border-left: 3px solid var(--primary-light);
            box-shadow: inset 0 0 20px rgba(30, 64, 175, 0.1);
        }

        .nav-item .icon {
            font-size: 18px;
            width: 20px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 16px 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: auto;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            background: var(--bg-sidebar-hover);
            cursor: pointer;
            transition: background 0.2s;
        }

        .user-info:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-sidebar-active);
        }

        .user-role {
            font-size: 12px;
            color: var(--text-muted);
        }

        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.08);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.15);
        }

        .btn-success {
            background: rgba(16, 185, 129, 0.08);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .btn-success:hover {
            background: rgba(16, 185, 129, 0.15);
        }

        .content-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow 0.2s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-md);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: transform 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .stat-icon.primary { background: linear-gradient(135deg, rgba(30, 64, 175, 0.15), rgba(59, 130, 246, 0.1)); color: var(--primary); }
        .stat-icon.success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .stat-icon.warning { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .stat-icon.info { background: rgba(14, 165, 233, 0.1); color: var(--info); }

        .stat-content {
            flex: 1;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .table-container {
            overflow-x: auto;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .data-table th {
            text-align: left;
            padding: 12px 16px;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        .data-table td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-light);
        }

        .data-table tbody tr:hover {
            background: var(--bg-secondary);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-badge.enabled {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .status-badge.disabled {
            background: rgba(107, 114, 128, 0.1);
            color: var(--text-muted);
        }

        .status-badge.expired {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
        }

        .actions-cell {
            display: flex;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .empty-state-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-state-desc {
            font-size: 14px;
            color: var(--text-muted);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 24px;
            width: 100%;
            max-width: 520px;
            margin: 20px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            background: var(--bg-secondary);
            transition: all 0.2s ease;
            outline: none;
        }

        .form-input:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .modal-footer {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .modal-footer .btn {
            flex: 1;
        }

        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 14px 20px;
            border-radius: var(--radius-md);
            color: white;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: var(--shadow-lg);
            transform: translateX(120%);
            transition: transform 0.3s ease;
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success { background: var(--success); }
        .toast.error { background: var(--error); }
        .toast.warning { background: var(--warning); }

        .generated-key {
            background: var(--bg-secondary);
            border: 1px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
            margin-top: 16px;
        }

        .generated-key-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: block;
        }

        .generated-key-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            word-break: break-all;
            background: var(--bg-primary);
            padding: 12px;
            border-radius: var(--radius-sm);
            color: var(--primary);
        }

        .copy-btn {
            margin-top: 12px;
            padding: 8px 16px;
            font-size: 13px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
        }

        .copy-btn:hover {
            background: var(--primary-dark);
        }

        .code-block {
            background: #1e293b;
            color: #e2e8f0;
            padding: 16px;
            border-radius: var(--radius-md);
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            overflow-x: auto;
            margin-top: 16px;
        }

        .code-block pre {
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        @media (max-width: 768px) {
            :root {
                --sidebar-width: 70px;
            }
            
            .sidebar-brand-title,
            .nav-item-text,
            .user-details {
                display: none;
            }
            
            .sidebar-header,
            .sidebar-footer {
                padding: 16px 8px;
            }
            
            .nav-item {
                justify-content: center;
            }
            
            .user-info {
                justify-content: center;
                padding: 12px 8px;
            }
            
            .header-title {
                font-size: 16px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .modal {
                margin: 10px;
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <div class="sidebar-brand-icon">⚙️</div>
                <span class="sidebar-brand-title">OCS AI</span>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <div class="nav-item active" data-page="dashboard">
                <span class="icon">📊</span>
                <span class="nav-item-text">仪表盘</span>
            </div>
            <div class="nav-item" data-page="apikeys">
                <span class="icon">🔑</span>
                <span class="nav-item-text">API Key 管理</span>
            </div>
            <div class="nav-item" data-page="configs">
                <span class="icon">⚡</span>
                <span class="nav-item-text">AI 配置</span>
            </div>
            <div class="nav-item" data-page="ocs">
                <span class="icon">📋</span>
                <span class="nav-item-text">OCS 配置</span>
            </div>
            <div class="nav-item" data-page="test">
                <span class="icon">🧪</span>
                <span class="nav-item-text">接口测试</span>
            </div>
            <div class="nav-item" data-page="settings">
                <span class="icon">🔧</span>
                <span class="nav-item-text">安全设置</span>
            </div>
        </nav>
        
        <div class="sidebar-footer">
            <div class="user-info" onclick="logout()">
                <div class="user-avatar">A</div>
                <div class="user-details">
                    <div class="user-name">管理员</div>
                    <div class="user-role">超级管理员</div>
                </div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="header-left">
                <h1 class="header-title" id="pageTitle">仪表盘</h1>
                <p class="header-subtitle" id="pageSubtitle">欢迎回来，查看系统概览</p>
            </div>
            <div class="header-right">
                <span style="color: var(--text-muted); font-size: 14px;">
                    服务器运行中
                </span>
            </div>
        </header>

        <div class="content-area" id="contentArea">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon primary">🔑</div>
                    <div class="stat-content">
                        <div class="stat-value" id="statKeys">0</div>
                        <div class="stat-label">API Key 总数</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon success">✅</div>
                    <div class="stat-content">
                        <div class="stat-value" id="statActive">0</div>
                        <div class="stat-label">活跃 Key</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon info">📡</div>
                    <div class="stat-content">
                        <div class="stat-value" id="statCalls">0</div>
                        <div class="stat-label">总调用次数</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon warning">⚡</div>
                    <div class="stat-content">
                        <div class="stat-value" id="statConfigs">0</div>
                        <div class="stat-label">AI 配置数</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">📊 最近活动</h2>
                </div>
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div class="empty-state-title">暂无活动记录</div>
                    <div class="empty-state-desc">系统启动后将显示最近的 API 调用记录</div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">生成 API Key</h3>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const adminToken = localStorage.getItem('adminToken');
        
        if (!adminToken) {
            window.location.href = '/login.html';
        }

        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'X-Admin-Token': adminToken
            };
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <span>${type === 'success' ? '✓' : type === 'error' ? '✕' : '⚠️'}</span>
                <span>${message}</span>
            `;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('adminToken');
                window.location.href = '/login.html';
            }
        }

        async function loadStats() {
            try {
                const [statsRes, configsRes] = await Promise.all([
                    fetch('/api/admin/stats', { headers: getHeaders() }),
                    fetch('/api/configs', { headers: getHeaders() })
                ]);

                if (!statsRes.ok || !configsRes.ok) {
                    if (statsRes.status === 401 || configsRes.status === 401) {
                        logout();
                    }
                    return;
                }

                const stats = await statsRes.json();
                const configs = await configsRes.json();

                document.getElementById('statKeys').textContent = stats.totalApiKeys || 0;
                document.getElementById('statActive').textContent = stats.activeKeys || 0;
                document.getElementById('statCalls').textContent = stats.totalCalls || 0;
                document.getElementById('statConfigs').textContent = configs.length || 0;
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        async function loadPage(page) {
            const contentArea = document.getElementById('contentArea');
            
            switch(page) {
                case 'dashboard':
                    contentArea.innerHTML = `
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-icon primary">🔑</div>
                                <div class="stat-content">
                                    <div class="stat-value" id="statKeys">0</div>
                                    <div class="stat-label">API Key 总数</div>
                                </div>

        async function createKey() {
            const alias = document.getElementById('newKeyAlias').value || '未命名';
            const expiresAt = document.getElementById('newKeyExpires').value;
            const maxCalls = document.getElementById('newKeyMaxCalls').value;
            
            try {
                const response = await fetch('/api/admin/apikeys', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({
                        alias,
                        expiresAt: expiresAt ? new Date(expiresAt).toISOString() : null,
                        maxCalls: maxCalls ? parseInt(maxCalls) : null
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('generatedKeyValue').textContent = data.key.key;
                    document.getElementById('generatedKeyDisplay').style.display = 'block';
                    showToast('API Key 生成成功', 'success');
                    setTimeout(() => {
                        loadPage('apikeys');
                        closeModal();
                    }, 2000);
                } else {
                    showToast(data.msg || '生成失败', 'error');
                }
            } catch (error) {
                showToast('生成失败', 'error');
            }
        }

            try {
                const response = await fetch('/api/admin/apikeys', { headers: getHeaders() });
                const data = await response.json();
                const keyData = data.keys.find(k => k.key === key);

                document.getElementById('modalTitle').textContent = '编辑 API Key';
                document.getElementById('modalContent').innerHTML = `

                        <label class="form-label">最大调用次数（可选）</label>

                    method: 'PUT',

        async function fetchCreateConfigModels() {
            const baseUrl = document.getElementById('newConfigBaseUrl').value;
            const apiKey = document.getElementById('newConfigApiKey').value;
            const btn = document.getElementById('fetchModelsBtn');
            
            if (!baseUrl || !apiKey) {
                showToast('请先填写 API Key 和 Base URL', 'warning');
                return;

            btn.disabled = true;
            btn.innerHTML = '获取中...';

            try {
                const response = await fetch(`/api/models?baseUrl=${encodeURIComponent(baseUrl)}&apiKey=${encodeURIComponent(apiKey)}`);
                const data = await response.json();

                const select = document.getElementById('newConfigModelSelect');
                if (data.code === 1 && data.models && data.models.length > 0) {
                    select.innerHTML = '<option value="">选择模型</option>' + 
                        data.models.map(m => `<option value="${m.id}">${m.id}</option>`).join('');
                    showToast(`成功获取 ${data.models.length} 个模型`, 'success');
                } else {
                    showToast(data.msg || '获取模型失败', 'error');
                }
            } catch (error) {
                showToast('获取模型失败: ' + error.message, 'error');

                btn.disabled = false;
                btn.innerHTML = '获取模型';

        async function fetchEditConfigModels() {
            const baseUrl = document.getElementById('editConfigBaseUrl').value;
            const apiKey = document.getElementById('editConfigApiKey').value;
            const btn = document.getElementById('fetchEditModelsBtn');
            
            if (!baseUrl || !apiKey) {
                showToast('请先填写 API Key 和 Base URL', 'warning');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '获取中...';

            try {
                const response = await fetch(`/api/models?baseUrl=${encodeURIComponent(baseUrl)}&apiKey=${encodeURIComponent(apiKey)}`);
                const data = await response.json();

                const select = document.getElementById('editConfigModelSelect');
                const currentModel = document.getElementById('editConfigModelInput').value;
                if (data.code === 1 && data.models && data.models.length > 0) {
                    select.innerHTML = '<option value="">选择模型</option>' + 
                        data.models.map(m => `<option value="${m.id}" ${m.id === currentModel ? 'selected' : ''}>${m.id}</option>`).join('');
                    showToast(`成功获取 ${data.models.length} 个模型`, 'success');
                } else {
                    showToast(data.msg || '获取模型失败', 'error');
                }
            } catch (error) {
                showToast('获取模型失败: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '获取模型';
            }
        }

        async function saveConfig() {
            const id = document.getElementById('editConfigId').value;
            const name = document.getElementById('editConfigName').value;
            const provider = document.getElementById('editConfigProvider').value;
            const apiKey = document.getElementById('editConfigApiKey').value;
            const baseUrl = document.getElementById('editConfigBaseUrl').value;
            const modelSelect = document.getElementById('editConfigModelSelect').value;
            const modelInput = document.getElementById('editConfigModelInput').value;
            const model = modelSelect || modelInput;
            
            try {
                const response = await fetch(`/api/configs/${id}`, {
                    method: 'PUT',
                    headers: getHeaders(),
                    body: JSON.stringify({ name, provider, apiKey, model, baseUrl })
                });
                
                const data = await response.json();
                
                if (data.code === 1) {
                    showToast('保存成功', 'success');
                    loadPage('configs');
                    closeModal();
                } else {
                    showToast(data.msg || '保存失败', 'error');
                }
            } catch (error) {
                showToast('保存失败', 'error');
            }
        }

        async function toggleConfig(id) {
            try {
                const response = await fetch(`/api/configs/${id}/enable`, {
                    method: 'POST',
                    headers: getHeaders()
                });
                
                const data = await response.json();
                showToast(data.msg, data.code === 1 ? 'success' : 'error');
                loadPage('configs');
            } catch (error) {
                showToast('操作失败', 'error');
            }
        }

        async function deleteConfig(id) {
            if (!confirm('确定要删除这个配置吗？')) return;
            
            try {
                const response = await fetch(`/api/configs/${id}`, {
                    method: 'DELETE',
                    headers: getHeaders()
                });
                
                const data = await response.json();
                showToast(data.msg, data.code === 1 ? 'success' : 'error');
                loadPage('configs');
            } catch (error) {
                showToast('删除失败', 'error');
            }
        }

        function loadOcsConfig() {
            document.getElementById('contentArea').innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">📋 OCS 题库配置</h2>
                    </div>
                    <div class="form-group">
                        <label class="form-label">服务器地址</label>
                        <input type="text" class="form-input" id="ocsServerUrl" placeholder="http://localhost:3000">
                    </div>
                    <div class="form-group">
                        <label class="form-label">API Key</label>
                        <input type="text" class="form-input" id="ocsApiKey" placeholder="ocs_xxxxxxxxxxxx">
                    </div>
                    <button class="btn btn-primary" onclick="generateOcsConfig()" style="margin-bottom: 16px;">
                        <span>🔧</span> 生成配置代码
                    </button>
                    <div id="ocsConfigCode" style="display: none;">
                        <div class="code-block">
                            <pre id="configCodeContent"></pre>
                        </div>
                        <button class="btn btn-secondary" onclick="copyOcsConfig()" style="margin-top: 12px;">
                            <span>📋</span> 复制配置代码
                        </button>
                    </div>
                </div>
            `;
        }

        function generateOcsConfig() {
            const serverUrl = document.getElementById('ocsServerUrl').value || 'http://localhost:3000';
            const apiKey = document.getElementById('ocsApiKey').value || 'YOUR_API_KEY';
            
            const config = `{
  name: "AI智能搜题",
  homepage: "${serverUrl}",
  url: "${serverUrl}/api/answer",
  method: "post",
  type: "GM_xmlhttpRequest",
  contentType: "json",
  data: {
    apiKey: "${apiKey}",
    title: "\${title}",
    options: "\${options}",
    type: "\${type}"
  },
  handler: "return (res)=> res.code === 1 ? [res.title, res.answer] : undefined"
}`;
            
            document.getElementById('configCodeContent').textContent = config;
            document.getElementById('ocsConfigCode').style.display = 'block';
            showToast('配置代码已生成', 'success');
        }

        function copyOcsConfig() {
            const code = document.getElementById('configCodeContent').textContent;
            navigator.clipboard.writeText(code).then(() => {
                showToast('配置代码已复制', 'success');
            });
        }

        async function loadApiTest() {
            let apiKeysHtml = '<input type="text" class="form-input" id="testApiKey" placeholder="输入 API Key">';
            try {
                const response = await fetch('/api/admin/apikeys', { headers: getHeaders() });
                if (response.ok) {
                    const data = await response.json();
                    const keys = data.keys || [];
                    if (keys.length > 0) {
                        apiKeysHtml = `
                            <select class="form-select" id="testApiKeySelect" onchange="toggleTestApiKeyInput()">
                                <option value="">选择已存在的 Key</option>
                                ${keys.map(k => `<option value="${k.key}">${k.alias} (${k.key.substring(0, 12)}...)</option>`).join('')}
                                <option value="custom">手动输入</option>
                            </select>
                            <input type="text" class="form-input" id="testApiKeyCustom" placeholder="输入 API Key" style="display: none; margin-top: 8px;">
                        `;
                    }
                }
            } catch (e) {}

            document.getElementById('contentArea').innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">🧪 API 接口测试</h2>
                    </div>
                    <div class="form-group">
                        <label class="form-label">API Key</label>
                        ${apiKeysHtml}
                        <div style="font-size: 12px; color: var(--warning); margin-top: 4px;">⚠️ 必须填写有效的 API Key 才能调用接口</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">题目内容</label>
                        <input type="text" class="form-input" id="testTitle" placeholder="输入题目内容...">
                    </div>
                    <div class="form-group">
                        <label class="form-label">选项（可选）</label>
                        <textarea class="form-input" id="testOptions" placeholder="A. 选项1&#10;B. 选项2&#10;C. 选项3&#10;D. 选项4" style="min-height: 80px;"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">题目类型</label>
                        <select class="form-select" id="testType">
                            <option value="single">单选题</option>
                            <option value="multiple">多选题</option>
                            <option value="judgement">判断题</option>
                            <option value="completion">填空题</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="sendApiTest()" style="width: 100%;">
                        <span>🚀</span> 发送测试请求
                    </button>
                    <div id="testResult" style="display: none; margin-top: 20px;">
                        <div class="card" style="margin-bottom: 0; background: var(--bg-secondary);">
                            <div class="card-header">
                                <h3 class="card-title" style="font-size: 14px;">📡 响应结果</h3>
                                <span class="status-badge" id="testStatus"></span>
                            </div>
                            <div class="code-block" style="margin: 0;">
                                <pre id="testResponse"></pre>
                            </div>
                            <div id="answerHighlight" style="display: none; margin-top: 16px; padding: 16px; background: rgba(30, 64, 175, 0.1); border: 1px solid rgba(30, 64, 175, 0.2); border-radius: var(--radius-md);">
                                <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">✨ AI 答案</div>
                                <div style="font-size: 18px; font-weight: 600; color: var(--primary);" id="answerText"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function toggleTestApiKeyInput() {
            const select = document.getElementById('testApiKeySelect');
            const customInput = document.getElementById('testApiKeyCustom');
            if (select && customInput) {
                customInput.style.display = select.value === 'custom' ? 'block' : 'none';
            }
        }

        async function sendApiTest() {
            let apiKey = '';
            const select = document.getElementById('testApiKeySelect');
            if (select) {
                apiKey = select.value === 'custom' ? document.getElementById('testApiKeyCustom').value : select.value;
            } else {
                apiKey = document.getElementById('testApiKey').value;
            }
            const title = document.getElementById('testTitle').value;
            const options = document.getElementById('testOptions').value;
            const type = document.getElementById('testType').value;

            if (!apiKey) {
                showToast('请填写 API Key', 'error');
                return;
            }

            const testResult = document.getElementById('testResult');
            const testStatus = document.getElementById('testStatus');
            const testResponse = document.getElementById('testResponse');
            const answerHighlight = document.getElementById('answerHighlight');
            const answerText = document.getElementById('answerText');

            testResult.style.display = 'block';
            testStatus.textContent = '处理中...';
            testStatus.className = 'status-badge';
            testResponse.textContent = '正在请求...';
            answerHighlight.style.display = 'none';

            try {
                const response = await fetch('/api/answer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey, title, options, type })
                });

                const data = await response.json();
                
                if (data.code === 1) {
                    testStatus.textContent = '✓ 成功';
                    testStatus.className = 'status-badge enabled';
                    testResponse.textContent = JSON.stringify(data, null, 2);
                    answerText.textContent = data.answer;
                    answerHighlight.style.display = 'block';
                    showToast('请求成功', 'success');
                } else {
                    testStatus.textContent = '✕ 失败';
                    testStatus.className = 'status-badge disabled';
                    testResponse.textContent = JSON.stringify(data, null, 2);
                    showToast(data.msg || '请求失败', 'error');
                }
            } catch (error) {
                testStatus.textContent = '✕ 错误';
                testStatus.className = 'status-badge disabled';
                testResponse.textContent = `错误: ${error.message}`;
                showToast('请求错误', 'error');
            }
        }

        async function loadSettings() {
            try {
                const response = await fetch('/api/admin/status', { headers: getHeaders() });
                if (!response.ok) {
                    if (response.status === 401) { logout(); return; }
                    throw new Error('加载失败');
                }
                
                const admin = await response.json();
                
                document.getElementById('contentArea').innerHTML = `
                    <div class="card">
                        <div class="card-header">
                            <h2 class="card-title">🔐 管理员账户</h2>
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px;">
                            <div class="stat-card">
                                <div class="stat-icon primary">👤</div>
                                <div class="stat-content">
                                    <div class="stat-value">${admin.username}</div>
                                    <div class="stat-label">用户名</div>
                                </div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon info">📅</div>
                                <div class="stat-content">
                                    <div class="stat-value">${admin.lastLogin ? new Date(admin.lastLogin).toLocaleString() : '从未登录'}</div>
                                    <div class="stat-label">最后登录</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">
                            <h2 class="card-title">🔑 修改密码</h2>
                        </div>
                        <div class="form-group">
                            <label class="form-label">当前密码</label>
                            <input type="password" class="form-input" id="currentPwd" placeholder="输入当前密码">
                        </div>
                        <div class="form-group">
                            <label class="form-label">新密码</label>
                            <input type="password" class="form-input" id="newPwd" placeholder="输入新密码（至少6位）">
                        </div>
                        <div class="form-group">
                            <label class="form-label">确认密码</label>
                            <input type="password" class="form-input" id="confirmPwd" placeholder="再次输入新密码">
                        </div>
                        <button class="btn btn-primary" onclick="changePassword()">
                            <span>💾</span> 修改密码
                        </button>
                    </div>
                `;
            } catch (error) {
                console.error('加载设置失败:', error);
            }
        }

        async function changePassword() {
            const currentPwd = document.getElementById('currentPwd').value;
            const newPwd = document.getElementById('newPwd').value;
            const confirmPwd = document.getElementById('confirmPwd').value;
            
            if (!currentPwd) {
                showToast('请输入当前密码', 'error');
                return;
            }
            
            if (newPwd.length < 6) {
                showToast('新密码至少需要6位', 'error');
                return;
            }
            
            if (newPwd !== confirmPwd) {
                showToast('两次输入的密码不一致', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/admin/change-password', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({
                        username: 'admin',
                        oldPassword: currentPwd,
                        newPassword: newPwd
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast('密码修改成功', 'success');
                    document.getElementById('currentPwd').value = '';
                    document.getElementById('newPwd').value = '';
                    document.getElementById('confirmPwd').value = '';
                } else {
                    showToast(data.msg || '修改失败', 'error');
                }
            } catch (error) {
                showToast('修改失败', 'error');
            }
        }

        loadStats();
    </script>
</body>
</html>
