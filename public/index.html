<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCS AI 题库配置中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e40af;
            --primary-dark: #1e3a8a;
            --primary-light: #3b82f6;
            --primary-lighter: #60a5fa;
            --success: #059669;
            --error: #dc2626;
            --warning: #d97706;
            --info: #0284c7;
            --bg-primary: #eff6ff;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-input: #f0f9ff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border: #dbeafe;
            --border-light: #e0f2fe;
            --shadow-sm: 0 1px 2px rgba(30, 64, 175, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(30, 64, 175, 0.1), 0 2px 4px -2px rgba(30, 64, 175, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(30, 64, 175, 0.15), 0 4px 6px -4px rgba(30, 64, 175, 0.1);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 60px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 50%, var(--primary-lighter) 100%);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 8px 32px rgba(30, 64, 175, 0.4);
            margin-bottom: 32px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .title {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 40px;
            text-align: center;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 32px;
            width: 100%;
            box-shadow: var(--shadow-lg);
        }

        .status-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            background: var(--bg-input);
            border-radius: var(--radius-lg);
            margin-bottom: 24px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        .status-dot.offline {
            background: var(--error);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(5, 150, 105, 0.4); }
            50% { opacity: 0.8; box-shadow: 0 0 0 8px rgba(5, 150, 105, 0); }
        }

        .status-text {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(30, 64, 175, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(30, 64, 175, 0.5);
        }

        .btn-secondary {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border);
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .info-section {
            margin-top: 24px;
            padding: 16px;
            background: var(--bg-input);
            border-radius: var(--radius-md);
        }

        .info-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .info-item:last-child {
            margin-bottom: 0;
        }

        .info-icon {
            font-size: 16px;
        }

        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-icon">🤖</div>
        <h1 class="title">OCS AI 题库配置中心</h1>
        <p class="subtitle">智能搜题后端管理平台</p>

        <div class="card">
            <div class="status-badge" id="statusBadge">
                <div class="status-dot" id="statusDot"></div>
                <span class="status-text" id="statusText">检查中...</span>
            </div>

            <a href="/login.html" class="btn btn-primary" id="adminBtn">
                <span>🔐</span> 进入管理后台
            </a>

            <div class="info-section">
                <div class="info-title">快速开始</div>
                <div class="info-item">
                    <span class="info-icon">1️⃣</span>
                    <span>登录管理后台，配置 AI 提供商</span>
                </div>
                <div class="info-item">
                    <span class="info-icon">2️⃣</span>
                    <span>生成 API Key 用于接口调用</span>
                </div>
                <div class="info-item">
                    <span class="info-icon">3️⃣</span>
                    <span>复制配置代码到 OCS 刷题脚本</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <a href="/login.html">管理后台登录</a>
            · 
            <span>支持 DeepSeek / 阿里云百炼 / OpenAI</span>
        </div>
    </div>

    <script>
        async function checkHealth() {
            try {
                const response = await fetch('/api/health');
                const statusDot = document.getElementById('statusDot');
                const statusText = document.getElementById('statusText');
                
                if (response.ok) {
                    statusDot.classList.remove('offline');
                    statusText.textContent = '服务运行正常';
                } else {
                    statusDot.classList.add('offline');
                    statusText.textContent = '服务异常';
                }
            } catch {
                document.getElementById('statusDot').classList.add('offline');
                document.getElementById('statusText').textContent = '连接失败';
            }
        }

        checkHealth();
        setInterval(checkHealth, 30000);
    </script>
</body>
</html>
